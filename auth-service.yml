server:
  port: 9090

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:mysql://localhost:3306/shopsphere_auth
    username: root
    password: Rushi@12345

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

# =========================
# 🔹 EUREKA CONFIG
# =========================
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: false
    instance-id: ${spring.application.name}:${server.port}
    hostname: localhost
    ip-address: 127.0.0.1
    non-secure-port: ${server.port}
    non-secure-port-enabled: true

# =========================
# 🔧 FIX: SPRINGDOC / SWAGGER
# Expose api-docs at /v3/api-docs (default)
# The API Gateway rewrites /auth/v3/api-docs → /v3/api-docs before forwarding here
# =========================
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
