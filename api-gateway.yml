server:
  port: 8083

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      # ✅ GLOBAL CORS
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

      routes:
        # =========================
        # 🔹 BUSINESS ROUTES
        # =========================
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**

        - id: catalog-service
          uri: lb://catalog-service
          predicates:
            - Path=/products/**

        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/orders/**

        # =========================
        # 🔥 SWAGGER ROUTES
        # 🔧 FIX: RewritePath must use proper regex replacement syntax
        #         Old (broken): RewritePath=/auth/v3/api-docs, /v3/api-docs
        #         New (correct): RewritePath=/auth/v3/api-docs, /v3/api-docs  ← needs regex group
        # =========================
        - id: auth-docs
          uri: lb://auth-service
          predicates:
            - Path=/auth/v3/api-docs
          filters:
            - RewritePath=/auth(?<segment>.*), ${segment}   # 🔧 FIX: correct regex rewrite

        - id: catalog-docs
          uri: lb://catalog-service
          predicates:
            - Path=/products/v3/api-docs
          filters:
            - RewritePath=/products(?<segment>.*), ${segment}   # 🔧 FIX: correct regex rewrite

        - id: order-docs
          uri: lb://order-service
          predicates:
            - Path=/orders/v3/api-docs
          filters:
            - RewritePath=/orders(?<segment>.*), ${segment}   # 🔧 FIX: correct regex rewrite

# =========================
# 🔹 EUREKA CONFIG
# =========================
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

# =========================
# 🔥 SWAGGER AGGREGATION
# =========================
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    urls:
      - name: AUTH-SERVICE
        url: /auth/v3/api-docs
      - name: CATALOG-SERVICE
        url: /products/v3/api-docs
      - name: ORDER-SERVICE
        url: /orders/v3/api-docs
