server:
  port: 8083

spring:
  application:
    name: api-gateway

  cloud:
    gateway:

      # ✅ GLOBAL CORS
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

      routes:

        # =========================
        # 🔹 BUSINESS ROUTES
        # =========================

        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**

        - id: catalog-service
          uri: lb://CATALOG-SERVICE
          predicates:
            - Path=/products/**

        - id: order-service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/orders/**

        # =========================
        # 🔥 SWAGGER ROUTES (FIXED)
        # =========================

        - id: auth-docs
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/v3/api-docs
          filters:
            - RewritePath=/auth/v3/api-docs, /v3/api-docs

        - id: catalog-docs
          uri: lb://CATALOG-SERVICE
          predicates:
            - Path=/products/v3/api-docs
          filters:
            - RewritePath=/products/v3/api-docs, /v3/api-docs

        - id: order-docs
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/orders/v3/api-docs
          filters:
            - RewritePath=/orders/v3/api-docs, /v3/api-docs


# =========================
# 🔹 EUREKA CONFIG
# =========================
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka


# =========================
# 🔥 SWAGGER AGGREGATION (FIXED)
# =========================
springdoc:
  api-docs:
    enabled: true

  swagger-ui:
    enabled: true
    path: /swagger-ui.html

    urls:
      - name: AUTH-SERVICE
        url: /auth/v3/api-docs

      - name: CATALOG-SERVICE
        url: /products/v3/api-docs

      - name: ORDER-SERVICE
        url: /orders/v3/api-docs
