server:
  port: 8083

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        # =========================
        # 🔹 NORMAL SERVICE ROUTES
        # =========================

        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**

        - id: catalog-service
          uri: lb://CATALOG-SERVICE
          predicates:
            - Path=/products/**

        - id: order-service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/orders/**


        # =========================
        # 🔥 SWAGGER DOC ROUTES
        # =========================

        - id: auth-docs
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/v3/api-docs/auth
          filters:
            - RewritePath=/v3/api-docs/auth, /v3/api-docs

        - id: catalog-docs
          uri: lb://CATALOG-SERVICE
          predicates:
            - Path=/v3/api-docs/catalog
          filters:
            - RewritePath=/v3/api-docs/catalog, /v3/api-docs

        - id: order-docs
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/v3/api-docs/order
          filters:
            - RewritePath=/v3/api-docs/order, /v3/api-docs


# =========================
# 🔹 EUREKA CONFIG
# =========================
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka


# =========================
# 🔥 SWAGGER AGGREGATION
# =========================
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    urls:
      - name: AUTH-SERVICE
        url: /v3/api-docs/auth
      - name: CATALOG-SERVICE
        url: /v3/api-docs/catalog
      - name: ORDER-SERVICE
        url: /v3/api-docs/order
