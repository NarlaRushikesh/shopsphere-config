spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        # =========================
        # NORMAL ROUTES
        # =========================
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**

        - id: catalog-service
          uri: lb://CATALOG-SERVICE
          predicates:
            - Path=/products/**

        # =========================
        # SWAGGER DOC ROUTES 🔥
        # =========================
        - id: auth-docs
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/v3/api-docs/auth
          filters:
            - RewritePath=/v3/api-docs/auth, /v3/api-docs

        - id: catalog-docs
          uri: lb://CATALOG-SERVICE
          predicates:
            - Path=/v3/api-docs/catalog
          filters:
            - RewritePath=/v3/api-docs/catalog, /v3/api-docs

        - id: order-docs
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/v3/api-docs/order
          filters:
            - RewritePath=/v3/api-docs/order, /v3/api-docs
